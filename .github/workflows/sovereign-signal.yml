name: Sovereign Signal — Daily Poll

on:
  schedule:
    # Run at 10:00 UTC daily (reports typically ready by then)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  poll-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Sovereign Signal poller
        working-directory: sovereign-signal
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Polling for date: $TODAY"
          python3 poller.py --date "$TODAY" --partial

      - name: Check for changes
        id: changes
        working-directory: sovereign-signal
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new data — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New data found — will commit."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "sovereign-signal-bot"
          git config user.email "bot@noreply.github.com"
          git commit -m "Daily update: $(date -u +%Y-%m-%d) cycle"
          git push
