<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#013124"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Yellow accent line at bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="#FEE000"/>

  <!-- Logo icon (two stacked pills, white + yellow) -->
  <g transform="translate(498, 175)">
    <!-- Top bar -->
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.3)"/>
    <rect x="52" y="0" width="152" height="28" rx="14" fill="#FFFFFF"/>

    <!-- Bottom bar -->
    <rect x="0" y="36" width="65" height="28" rx="14" fill="rgba(255,255,255,0.3)"/>
    <rect x="30" y="36" width="174" height="28" rx="14" fill="#FFFFFF"/>
  </g>

  <!-- "Fuse pipeline" text -->
  <text x="600" y="310" text-anchor="middle" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="400" letter-spacing="1">Fuse <tspan font-weight="800">pipeline</tspan></text>

  <!-- "INTELLIGENCE" in yellow -->
  <text x="600" y="380" text-anchor="middle" fill="#FEE000" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="22" font-weight="700" letter-spacing="12">INTELLIGENCE</text>

  <!-- Thin divider -->
  <line x1="520" y1="410" x2="680" y2="410" stroke="rgba(254,224,0,0.25)" stroke-width="1"/>

  <!-- Report title -->
  <text x="600" y="455" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="Inter, sans-serif" font-size="18" font-weight="500">Market Alignment Assessment</text>
  <text x="600" y="490" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="15" font-weight="400">XREAL and the Next Phase of Consumer AR Display Glasses</text>

  <!-- Noah credit -->
  <text x="600" y="570" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing="4">NOAH WIRE SERVICES</text>
</svg>
